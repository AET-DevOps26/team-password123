services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrition-api-postgres
    environment:
      POSTGRES_DB: nutrition
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: nutrition
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition -d nutrition"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
