spring:
  application:
    name: meals-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nutrition?currentSchema=meals}
    username: ${SPRING_DATASOURCE_USERNAME:nutrition}
    password: ${SPRING_DATASOURCE_PASSWORD:nutrition}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: meals
    open-in-view: false
  flyway:
    schemas: meals
    default-schema: meals
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8082}

app:
  jwt:
    secret: ${APP_JWT_SECRET:local-development-secret-change-me-please-1234567890}
  storage:
    upload-dir: ${APP_UPLOAD_DIR:uploads}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
